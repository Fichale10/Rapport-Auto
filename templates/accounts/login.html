{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — ReportXCare | Yas</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yas-blue:   #003087;
      --yas-yellow: #FFC72C;
      --yas-dark:   #001a4d;
      --yas-light:  #e8f0ff;
    }

    body {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      font-family: 'DM Sans', sans-serif;
      background: var(--yas-blue);
    }

    /* ══ PANNEAU GAUCHE ══════════════════════════════════════════════ */
    .brand-panel {
      background: url("{% static 'reports/login_bg_corridor_yas.svg' %}") center / cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 52px 60px;
      position: relative;
      overflow: hidden;
    }
    /* vignette subtil uniquement en haut pour garder le logo lisible */
    .brand-panel::before {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background:
        linear-gradient(to bottom,  rgba(4,11,37,.75) 0%, rgba(4,11,37,.0) 35%),
        linear-gradient(to right,   rgba(4,11,37,.4)  0%, rgba(4,11,37,.0) 50%);
    }

    /* Logo */
    .brand-top { position: relative; z-index: 1; }
    .yas-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px; color: var(--yas-yellow);
      letter-spacing: 10px; line-height: 1;
      text-shadow: 0 0 40px rgba(255,199,44,.5), 0 2px 12px rgba(0,0,0,.8);
    }
    .yas-tagline {
      color: rgba(255,255,255,0.65); font-size: 11px;
      letter-spacing: 5px; text-transform: uppercase; margin-top: 6px;
      text-shadow: 0 1px 6px rgba(0,0,0,.9);
    }

    /* ══ PANNEAU DROIT ═══════════════════════════════════════════════ */
    .form-panel {
      background: #fff;
      display: flex; flex-direction: column; justify-content: center;
      padding: 80px 72px;
      border-radius: 32px 0 0 32px;
      position: relative;
      animation: slideInRight .5s cubic-bezier(.22,.61,.36,1) both;
    }
    .form-inner {
      width: 100%; max-width: 420px; margin: auto;
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .form-header { margin-bottom: 36px; }
    .form-header h2 {
      font-size: 30px; font-weight: 700; color: var(--yas-blue); margin-bottom: 6px;
    }
    .form-header p { color: #999; font-size: 14px; }

    .alert {
      background: #fff3cd; border-left: 4px solid var(--yas-yellow);
      color: #7a5a00; padding: 12px 16px; border-radius: 10px;
      font-size: 14px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }

    /* Champs */
    .field { margin-bottom: 20px; }
    label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--yas-blue); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; opacity: 0.35; pointer-events: none;
      color: var(--yas-blue);
    }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #aab; transition: color .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .eye-btn:hover { color: var(--yas-blue); }
    .eye-btn svg { width: 18px; height: 18px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 14px 48px 14px 46px;
      background: #f5f7fb;
      border: 2px solid transparent; border-radius: 12px;
      color: #111; font-size: 15px; font-family: 'DM Sans', sans-serif;
      outline: none; transition: border-color .2s, background .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--yas-blue); background: #fff;
      box-shadow: 0 0 0 4px rgba(0,48,135,0.08);
    }
    input::placeholder { color: #bbc; }

    /* Bouton */
    button[type="submit"] {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--yas-yellow) 0%, #ffda6b 100%);
      border: none; border-radius: 12px;
      color: var(--yas-blue); font-size: 15px; font-weight: 700;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      letter-spacing: 0.5px; margin-top: 10px;
      transition: transform .15s, box-shadow .15s;
      position: relative; overflow: hidden;
    }
    button[type="submit"]::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 100%);
      opacity: 0; transition: opacity .2s;
    }
    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,199,44,0.45);
    }
    button[type="submit"]:hover::after { opacity: 1; }
    button[type="submit"]:active { transform: translateY(0); }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .brand-panel { display: none; }
      .form-panel { border-radius: 0; padding: 40px 28px; }
      .form-deco { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── Panneau gauche ── -->
  <div class="brand-panel">
    <div class="brand-top">
      <div class="yas-logo">YAS</div>
      <div class="yas-tagline">Mobile Network</div>
    </div>
  </div>

  <!-- ── Panneau droit ── -->
  <div class="form-panel">
    <div class="form-inner">

      <div class="form-header">
        <h2>Connexion</h2>
        <p>Accédez à votre espace ISOC</p>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert">⚠️ {{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="field">
          <label for="username">Identifiant</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" name="username"
                   placeholder="Votre identifiant" autofocus required>
          </div>
        </div>

        <div class="field">
          <label for="password">Mot de passe</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password"
                   placeholder="••••••••" required>
            <button type="button" class="eye-btn" id="eyeBtn" title="Afficher/masquer">
              <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit">Se connecter →</button>
      </form>

    </div>
  </div>

<script>
  const eyeBtn = document.getElementById('eyeBtn');
  const pwdInput = document.getElementById('password');
  const eyeOff = document.getElementById('eyeOff');
  const eyeOn  = document.getElementById('eyeOn');

  eyeBtn.addEventListener('click', function() {
    const visible = pwdInput.type === 'text';
    pwdInput.type = visible ? 'password' : 'text';
    eyeOff.style.display = visible ? 'block' : 'none';
    eyeOn.style.display  = visible ? 'none'  : 'block';
    pwdInput.focus();
  });
</script>
</body>
</html>
